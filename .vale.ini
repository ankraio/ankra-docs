StylesPath = .vale/styles
MinAlertLevel = warning

Vocab = Ankra

[formats]
mdx = md

[*.mdx]
BasedOnStyles = Vale, Ankra
# MDX components and code are not prose
BlockIgnores = (?s)<(CodeGroup|Frame|Steps|Tabs|AccordionGroup|CardGroup)[^>]*>.*?</\1>
TokenIgnores = (\$\{\{[^}]*\}\}), (`[^`]+`)

# Vale.Terms enforces the casing of every accept.txt entry everywhere it
# appears. That is wrong for a CLI-heavy docs set: it flags the `ankra`
# binary name and command args (`helm`, `sops`, `argocd`, `ovh`, `hetzner`)
# hundreds of times where lowercase is correct, and it fights legitimate
# casing (K3s, OVHcloud, the Kubernetes `Ingress`/`Namespace` kinds). The
# inline-code exclusion (TokenIgnores) also drifts in large files, so the
# rule fires inside code. Terminology casing is handled in prose by review.
Vale.Terms = NO

# Replace the built-in dictionary spell-check with Ankra.SpellCheck, which
# adds filters for code-shaped tokens (snake_case / camelCase identifiers)
# that leak from code samples when the inline-code exclusion drifts.
Vale.Spelling = NO

# Repetition false-fires on version placeholders in the generated CLI
# reference (e.g. "x.x.x releases"), which cannot be hand-edited.
Vale.Repetition = NO
