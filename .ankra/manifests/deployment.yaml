apiVersion: apps/v1
kind: Deployment
metadata:
  name: ankra-docs
  labels:
    app.kubernetes.io/name: ankra-docs
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ankra-docs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ankra-docs
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: ankra-docs
          image: ghcr.io/ankraio/ankra-docs:${{ ankra.image_tag }}
          imagePullPolicy: IfNotPresent
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
