# pnpm settings for this (single-package) repo. pnpm 10.16+ reads project
# settings from this file (camelCase keys).

# Don't auto-run an install before every `pnpm run <script>`. Dependencies
# are installed explicitly (`pnpm install` locally, `--frozen-lockfile` in
# CI); the implicit pre-run check otherwise misresolves the project root in a
# multi-repo checkout and fails with ERR_PNPM_NO_PKG_MANIFEST.
verifyDepsBeforeRun: false

# Build-script decisions for the mint CLI's native/transitive dependencies.
# pnpm blocks postinstall scripts unless explicitly allowed, so making the
# choice here keeps `pnpm install` deterministic and free of the
# ERR_PNPM_IGNORED_BUILDS prompt in CI and locally.
allowBuilds:
  # Native/functional dependencies the Mintlify CLI needs at runtime.
  sharp: true       # image optimisation (native libvips bindings)
  puppeteer: true   # headless Chrome for rendering / broken-link checks
  keytar: true      # native credential storage for `mint` auth
  # Install-time telemetry only — no functional impact, so don't run it.
  '@scarf/scarf': false
