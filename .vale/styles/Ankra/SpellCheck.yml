extends: spelling
message: "Did you really mean '%s'?"
level: error
# Uses the Ankra vocabulary (config/vocabularies/Ankra/accept.txt) plus the
# filters below. Filters drop code-shaped tokens that leak out of code
# samples / inline code when Vale's markdown code-exclusion drifts in large
# MDX files - so we don't have to enumerate every identifier in accept.txt.
filters:
  # snake_case identifiers: encrypted_paths, outside_sync_window, git_repository
  - '\w*_\w*'
  # camelCase identifiers: nodeSelectors, jsonPointers, emptyDir, vCPUs
  - '[a-z][a-zA-Z0-9]*[A-Z][a-zA-Z0-9]*'
