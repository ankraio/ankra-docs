extends: substitution
message: "Use '%s' instead of '%s' (house style: UK English, Ankra terminology)."
level: warning
ignorecase: false
swap:
  organization: organisation
  organizations: organisations
  behavior: behaviour
  color(?!:): colour
  parameterize: parameterise
  # 'addon' is fine in code/YAML (TokenIgnores covers backticks); prose uses add-on
  '\baddon\b': add-on
  '\baddons\b': add-ons
