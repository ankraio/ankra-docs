name: Docs CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  structure:
    name: Structure checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install check dependencies
        run: pip install pyyaml

      - name: Navigation covers every page
        run: python3 scripts/check_nav.py

      - name: Frontmatter complete
        run: python3 scripts/check_frontmatter.py

      - name: Snippets free of corruption
        run: python3 scripts/check_snippets.py

      - name: Live OpenAPI spec reachable
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' https://platform.ankra.app/openapi.json)
          if [ "$status" != "200" ]; then
            echo "OpenAPI spec at platform.ankra.app returned HTTP $status"
            exit 1
          fi
          paths=$(curl -s https://platform.ankra.app/openapi.json | python3 -c 'import json,sys; print(len(json.load(sys.stdin)["paths"]))')
          echo "Live spec OK ($paths paths)"

  links:
    name: Broken links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Mintlify CLI
        run: npm ci

      - name: Check broken links
        run: npx mint broken-links

  prose:
    name: Prose lint (warnings)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: errata-ai/vale-action@v2
        with:
          fail_on_error: false
          filter_mode: added
